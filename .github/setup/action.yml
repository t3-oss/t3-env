name: Setup Workflow
description: Composite action that sets up Vite+ and installs dependencies
runs:
  using: "composite"
  steps:
    - uses: voidzero-dev/setup-vp@v1
      with:
        cache: true
    - uses: oven-sh/setup-bun@v2
      with:
        bun-version-file: package.json
    - run: vp install
      shell: bash
